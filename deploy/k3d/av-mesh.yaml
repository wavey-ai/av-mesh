apiVersion: v1
kind: Namespace
metadata:
  name: av-mesh
---
apiVersion: v1
kind: Service
metadata:
  name: av-mesh-uk
  namespace: av-mesh
  labels:
    app.kubernetes.io/name: av-mesh
    app.kubernetes.io/instance: uk
spec:
  selector:
    app.kubernetes.io/name: av-mesh
    app.kubernetes.io/instance: uk
  ports:
    - name: http
      port: 9444
      targetPort: http
      protocol: TCP
    - name: mesh
      port: 9101
      targetPort: mesh
      protocol: UDP
    - name: fec
      port: 12001
      targetPort: fec
      protocol: UDP
    - name: media-fec
      port: 12101
      targetPort: media-fec
      protocol: UDP
    - name: telemetry
      port: 7300
      targetPort: telemetry
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: av-mesh-us
  namespace: av-mesh
  labels:
    app.kubernetes.io/name: av-mesh
    app.kubernetes.io/instance: us
spec:
  selector:
    app.kubernetes.io/name: av-mesh
    app.kubernetes.io/instance: us
  ports:
    - name: http
      port: 9444
      targetPort: http
      protocol: TCP
    - name: mesh
      port: 9101
      targetPort: mesh
      protocol: UDP
    - name: fec
      port: 12001
      targetPort: fec
      protocol: UDP
    - name: media-fec
      port: 12101
      targetPort: media-fec
      protocol: UDP
    - name: telemetry
      port: 7300
      targetPort: telemetry
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: av-mesh-uk
  namespace: av-mesh
  labels:
    app.kubernetes.io/name: av-mesh
    app.kubernetes.io/instance: uk
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: av-mesh
      app.kubernetes.io/instance: uk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: av-mesh
        app.kubernetes.io/instance: uk
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/scheme: https
        prometheus.io/path: /metrics
        prometheus.io/port: "9444"
    spec:
      containers:
        - name: av-mesh
          image: av-mesh:local
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: av_mesh=info,playlists=info,web_service=info
          args:
            - --region
            - uk
            - --node-id
            - uk-k3d
            - --mesh-bind
            - 0.0.0.0:9101
            - --peer
            - av-mesh-us.av-mesh.svc.cluster.local:9101
            - --http-port
            - "9444"
            - --playback-base-url
            - https://127.0.0.1:19444/live
            - --fec-bind
            - 0.0.0.0:12001
            - --media-fec-bind
            - 0.0.0.0:12101
            - --telemetry-bind
            - 0.0.0.0:7300
            - --telemetry-peer
            - av-mesh-us.av-mesh.svc.cluster.local:7300
            - --telemetry-dns-name
            - localhost
            - --cert
            - /etc/av-mesh/tls/tls.crt
            - --key
            - /etc/av-mesh/tls/tls.key
            - --telemetry-interval-ms
            - "250"
            - --parts-per-segment
            - "2"
            - --window-parts
            - "24"
            - --slot-kb
            - "2048"
          ports:
            - name: http
              containerPort: 9444
              protocol: TCP
            - name: mesh
              containerPort: 9101
              protocol: UDP
            - name: fec
              containerPort: 12001
              protocol: UDP
            - name: media-fec
              containerPort: 12101
              protocol: UDP
            - name: telemetry
              containerPort: 7300
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /etc/av-mesh/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: av-mesh-tls
