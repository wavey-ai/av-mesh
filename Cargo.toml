[package]
name = "av-mesh"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Local AV cache mesh prototype with UDP-FEC cache replication and HLS egress"
repository = "https://github.com/wavey-ai/av-mesh"
readme = "README.md"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
bytes = "1.9"
clap = { version = "4.5", features = ["derive"] }
futures-util = "0.3"
http = "1"
message-packetizer = { git = "https://github.com/wavey-ai/message-packetizer.git" }
playlists = { git = "https://github.com/wavey-ai/playlists.git" }
rist-core-pure = { package = "rist-core", git = "https://github.com/wavey-ai/rist-rs.git", branch = "pure-rust" }
rist-mio-pure = { package = "rist-mio", git = "https://github.com/wavey-ai/rist-rs.git", branch = "pure-rust" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.45", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
web-service = { git = "https://github.com/wavey-ai/web-services.git", package = "web-service" }
